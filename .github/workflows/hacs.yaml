name: HACS validation

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # brands assets / upstream brands-repo listing are v1.0 tasks
          # (see PRD §7 "v1.0 — Stabilization"). Unignore before submitting
          # to the HACS default store.
          ignore: brands
