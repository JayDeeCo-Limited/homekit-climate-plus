name: pytest

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # Test environment needs HA's full `homekit` component import
          # chain, which eagerly pulls in haffmpeg / base36 / PyQRCode /
          # fnv-hash-fast. HA installs those only when stock homekit is
          # enabled, so a plain pip install of HA leaves them out.
          pip install \
            pytest \
            pytest-homeassistant-custom-component \
            'HAP-python==5.0.0' \
            haffmpeg \
            base36 \
            PyQRCode \
            fnv-hash-fast
      - name: Run tests
        run: pytest -q
