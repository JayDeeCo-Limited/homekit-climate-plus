name: pytest

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # Minimal test environment: pure-Python pytest plus HA's core
          # test helpers. We deliberately do NOT pull in the full HA
          # homekit chain (turbojpeg, ffmpeg, PyQRCode, base36, etc.) —
          # `custom_components/homekit_climate_plus/__init__.py` imports
          # the bridge module lazily so test collection doesn't trigger
          # that chain. Bridge and accessory integration tests belong in
          # a future suite with a real HA fixture.
          pip install pytest pytest-homeassistant-custom-component
      - name: Run tests
        run: pytest -q
